<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <!-- Musical note: stem + flag + head -->
    <ellipse cx="26" cy="44" rx="9" ry="7" fill="url(#note)" transform="rotate(-15 26 44)"/>
    <rect x="33" y="12" width="3.5" height="33" rx="1.5" fill="url(#note)"/>
    <path d="M36.5 12 C36.5 12 46 14 46 24 C46 30 40 28 36.5 25" fill="url(#note)" opacity="0.9"/>
    <!-- Small sparkle -->
    <circle cx="48" cy="16" r="2" fill="#00f0ff" opacity="0.7"/>
    <circle cx="44" cy="10" r="1.2" fill="#ff00aa" opacity="0.6"/>
  </g>
</svg>
